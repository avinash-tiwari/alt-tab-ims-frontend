name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build
        # We inject the environment variable here so it's available during 'npm run build'
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_HELP_URL_DASHBOARD: ${{ secrets.VITE_HELP_URL_DASHBOARD }}
          VITE_HELP_URL_ORDERS: ${{ secrets.VITE_HELP_URL_ORDERS }}
          VITE_HELP_URL_ITEMS: ${{ secrets.VITE_HELP_URL_ITEMS }}
          VITE_HELP_URL_CUSTOMERS: ${{ secrets.VITE_HELP_URL_CUSTOMERS }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALTTAB_POS }}
          channelId: live
          projectId: alttab-pos
          target: alt-tab-ims